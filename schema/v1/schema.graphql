"""
Links a mutation to its JSON Schema and UI Schema for form generation.
These schemas enable dynamic form rendering with validation in client applications.
"""
directive @formSchema(
  "Schema name matching the mutation (e.g., createProject)"
  name: String!
  "URL to the JSON Schema for validation"
  schema: String!
  "URL to the UI Schema for form layout"
  ui_schema: String!
) on FIELD_DEFINITION

schema {
  mutation: RootMutationType
  query: RootQueryType
}

type RootQueryType {
  "List all projects you have access to. Returns a paginated list sorted by name."
  projects(
    "Your organization ID"
    organizationId: ID!

    "How to sort results"
    sort: ProjectsSort

    "Pagination cursor from a previous response"
    cursor: Cursor
  ): ProjectsPage

  "Get a single project by its ID."
  project(
    "Your organization ID"
    organizationId: ID!

    "The project ID"
    id: ID!
  ): Project

  "List all environments you have access to. Returns a paginated list sorted by name."
  environments(
    "Your organization ID"
    organizationId: ID!

    "Filter results"
    filter: EnvironmentsFilter

    "How to sort results"
    sort: EnvironmentsSort

    "Pagination cursor from a previous response"
    cursor: Cursor
  ): EnvironmentsPage

  "Get a single environment by its ID."
  environment(
    "Your organization ID"
    organizationId: ID!

    "The environment ID"
    id: ID!
  ): Environment

  "List all packages you have access to. Returns a paginated list sorted by name."
  packages(
    "Your organization ID"
    organizationId: ID!

    "Filter results"
    filter: PackagesFilter

    "How to sort results"
    sort: PackagesSort

    "Pagination cursor from a previous response"
    cursor: Cursor
  ): PackagesPage

  "Get a single package by its ID."
  package(
    "Your organization ID"
    organizationId: ID!

    "The package ID"
    id: ID!
  ): Package

  """
  Get the configuration fields available across your packages.

  Returns all the unique fields from your package configurations that you can
  use to build search filters or dashboards. For example, if your packages have
  'database.instance_type' or 'cluster.node_count' fields, they'll appear here.
  """
  packageParamsDimensions(
    "Your organization ID"
    organizationId: ID!

    "How to sort results"
    sort: PackageParamsDimensionsSort

    "Pagination cursor from a previous response"
    cursor: Cursor
  ): PackageParamsDimensionsPage

  "List all deployments you have access to. Returns a paginated list, newest first."
  deployments(
    "Your organization ID"
    organizationId: ID!

    "Filter results"
    filter: DeploymentsFilter

    "How to sort results"
    sort: DeploymentsSort

    "Pagination cursor from a previous response"
    cursor: Cursor
  ): DeploymentsPage

  "Get a single deployment by its ID."
  deployment(
    "Your organization ID"
    organizationId: ID!

    "The deployment ID"
    id: ID!
  ): Deployment

  "Get information about yourself (the authenticated user or service account)."
  viewer: Viewer

  "Get server info and available authentication methods. No authentication required."
  server: Server!
}

type RootMutationType {
  "Create a new project in your organization."
  createProject(
    "Your organization ID"
    organizationId: ID!

    "Project details"
    input: CreateProjectInput!
  ): ProjectPayload @formSchema(name: "createProject", schema: "\/api\/v1\/schemas\/createProject.json", ui_schema: "\/api\/v1\/schemas\/createProject.ui.json")

  "Update a project's name or description."
  updateProject(
    "Your organization ID"
    organizationId: ID!

    "The project ID to update"
    id: ID!

    "Fields to update"
    input: UpdateProjectInput!
  ): ProjectPayload @formSchema(name: "updateProject", schema: "\/api\/v1\/schemas\/updateProject.json", ui_schema: "\/api\/v1\/schemas\/updateProject.ui.json")

  "Delete a project. You must delete all environments first."
  deleteProject(
    "Your organization ID"
    organizationId: ID!

    "The project ID to delete"
    id: ID!
  ): ProjectPayload

  "Create a new environment in a project."
  createEnvironment(
    "Your organization ID"
    organizationId: ID!

    "The project to create the environment in"
    projectId: ID!

    "Environment details"
    input: CreateEnvironmentInput!
  ): EnvironmentPayload @formSchema(name: "createEnvironment", schema: "\/api\/v1\/schemas\/createEnvironment.json", ui_schema: "\/api\/v1\/schemas\/createEnvironment.ui.json")

  "Update an environment's name or description."
  updateEnvironment(
    "Your organization ID"
    organizationId: ID!

    "The environment ID to update"
    id: ID!

    "Fields to update"
    input: UpdateEnvironmentInput!
  ): EnvironmentPayload @formSchema(name: "updateEnvironment", schema: "\/api\/v1\/schemas\/updateEnvironment.json", ui_schema: "\/api\/v1\/schemas\/updateEnvironment.ui.json")

  "Delete an environment. You must decommission all packages first."
  deleteEnvironment(
    "Your organization ID"
    organizationId: ID!

    "The environment ID to delete"
    id: ID!
  ): EnvironmentPayload
}

